    <rect x="88" y="190" width="250" height="118" rx="8" fill="#fbfdff" stroke="#d9e0ea"/>
    <text x="116" y="228" fill="#172033" font-size="20" font-weight="700">Request</text>
    <text x="116" y="262" fill="#607086" font-size="16">Find governed tables for</text>
