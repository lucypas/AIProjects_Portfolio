<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ServiceNow AI Gateway review gate snapshot</title>
  <desc id="desc">A workflow snapshot for incident summarization, warranty lookup, work order drafting, and human review blockers.</desc>
  <rect width="1280" height="760" fill="#f5f7fb"/>
  <rect x="40" y="40" width="1200" height="680" rx="8" fill="#ffffff" stroke="#d9e0ea"/>
  <text x="84" y="100" fill="#607086" font-family="Arial, sans-serif" font-size="14" font-weight="700">SERVICENOW AI GATEWAY</text>
